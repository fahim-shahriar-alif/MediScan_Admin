<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Management — MediScan Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#2563EB" />
          <path d="M16 7v18M7 16h18" stroke="#fff" stroke-width="3" stroke-linecap="round" />
        </svg>
        <div>
          <div class="sidebar-brand-text">MediScan</div>
          <div class="sidebar-brand-sub">Admin Panel</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="appointments.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          Appointments
        </a>
        <a href="patients.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Patients
        </a>
        <a href="doctors.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
            <path d="M2 21a10 10 0 0 1 16.9-7.2M19 15v6M16 18h6" />
          </svg>
          Doctors
        </a>
        <a href="admin-management.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            <path d="M16 11l1.5 1.5L20 10" />
          </svg>
          Admins
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarAdminName">Admin</div>
            <div class="sidebar-user-email" id="sidebarAdminEmail"></div>
          </div>
        </div>
        <button class="btn-signout" id="signOutBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
          Sign out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <button class="topbar-hamburger" id="hamburgerBtn" aria-label="Toggle menu">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 12h18M3 6h18M3 18h18" />
          </svg>
        </button>
        <span class="topbar-title">Admin Management</span>
        <button class="btn btn-primary btn-sm" id="addAdminBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Add Admin
        </button>
      </header>

      <div class="page-body">
        <div class="card">
          <div class="section-title">All Admins</div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>UID</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="adminsBody">
                <!-- Rendered by admin-management.js -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Admin Modal -->
  <div class="modal-overlay" id="addAdminModal" role="dialog" aria-modal="true" aria-labelledby="addAdminModalTitle">
    <div class="modal">
      <div class="modal-title" id="addAdminModalTitle">Create New Admin</div>
      <form id="addAdminForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="adminName">Full Name <span style="color:var(--danger)">*</span></label>
          <input id="adminName" type="text" class="form-input" placeholder="Jane Doe" />
          <div class="form-error" id="errAdminName"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="adminEmail">Email <span style="color:var(--danger)">*</span></label>
          <input id="adminEmail" type="email" class="form-input" placeholder="jane@hospital.com" />
          <div class="form-error" id="errAdminEmail"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="adminPassword">Password <span style="color:var(--danger)">*</span></label>
          <input id="adminPassword" type="password" class="form-input" placeholder="Min 6 characters" />
          <div class="form-error" id="errAdminPassword"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelAddAdminBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveAdminBtn">Create Admin</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/admin-management.js"></script>
</body>

</html>
