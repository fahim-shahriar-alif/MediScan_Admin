<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctors — MediScan Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#2563EB" />
          <path d="M16 7v18M7 16h18" stroke="#fff" stroke-width="3" stroke-linecap="round" />
        </svg>
        <div>
          <div class="sidebar-brand-text">MediScan</div>
          <div class="sidebar-brand-sub">Admin Panel</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="appointments.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          Appointments
        </a>
        <a href="patients.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Patients
        </a>
        <a href="doctors.html">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
            <path d="M2 21a10 10 0 0 1 16.9-7.2M19 15v6M16 18h6" />
          </svg>
          Doctors
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarAdminName">Admin</div>
            <div class="sidebar-user-email" id="sidebarAdminEmail"></div>
          </div>
        </div>
        <button class="btn-signout" id="signOutBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
          Sign out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <button class="topbar-hamburger" id="hamburgerBtn" aria-label="Toggle menu">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 12h18M3 6h18M3 18h18" />
          </svg>
        </button>
        <span class="topbar-title">Doctors</span>
        <button class="btn btn-primary btn-sm" id="addDoctorBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Add Doctor
        </button>
      </header>

      <div class="page-body">
        <div id="doctorsGrid" class="doctors-grid">
          <!-- Rendered by doctors.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="doctorModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add Doctor</div>
      <form id="doctorForm" novalidate>
        <input type="hidden" id="doctorId" />

        <div class="form-group">
          <label class="form-label" for="fieldName">Full Name <span style="color:var(--danger)">*</span></label>
          <input id="fieldName" type="text" class="form-input" placeholder="Dr. Jane Smith" />
          <div class="form-error" id="errName"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="fieldSpecialty">Specialty <span style="color:var(--danger)">*</span></label>
          <input id="fieldSpecialty" type="text" class="form-input" placeholder="Cardiology" />
          <div class="form-error" id="errSpecialty"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="fieldAddress">Clinic Address <span style="color:var(--danger)">*</span></label>
          <input id="fieldAddress" type="text" class="form-input" placeholder="123 Medical Center Dr" />
          <div class="form-error" id="errAddress"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="fieldPhone">Phone <span style="color:var(--danger)">*</span></label>
          <input id="fieldPhone" type="text" class="form-input" placeholder="+1 (555) 000-0000" />
          <div class="form-error" id="errPhone"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="fieldRating">Rating (1.0 – 5.0) <span
              style="color:var(--danger)">*</span></label>
          <input id="fieldRating" type="number" class="form-input" placeholder="4.5" min="1" max="5" step="0.1" />
          <div class="form-error" id="errRating"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Doctor</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/doctors.js"></script>
</body>

</html>
