    window.seedDoctors = async function () {
      const btn = document.getElementById('seedBtn');
      const log = document.getElementById('log');
      btn.disabled = true;
      btn.textContent = 'Inserting…';
      log.style.display = 'block';
      log.innerHTML = '';

      let success = 0, failed = 0;
      let lastSpecialty = '';

      for (const doctor of doctors) {
        if (doctor.specialty !== lastSpecialty) {
          log.innerHTML += `<div class="log-line separator">── ${doctor.specialty} ──</div>`;
          lastSpecialty = doctor.specialty;
        }
        try {
          await addDoc(collection(db, 'doctors'), {
            name: doctor.name,
            specialty: doctor.specialty,
            address: doctor.address,
            phone: doctor.phone,
            rating: doctor.rating,
            reviews: doctor.reviews,
            createdAt: serverTimestamp(),
          });
          success++;
          const tag = doctor.reviews > 100 ? '⭐ Senior' : '🆕 Junior';
          log.innerHTML += `<div class="log-line ok">✅ ${tag} — ${doctor.name} (${doctor.rating}★, ${doctor.reviews} reviews)</div>`;
        } catch (err) {
          failed++;
          log.innerHTML += `<div class="log-line err">❌ ${doctor.name} — ${err.message}</div>`;
        }
        log.scrollTop = log.scrollHeight;
      }

      log.innerHTML += `<div class="log-line done">✅ Done! ${success} inserted, ${failed} failed.</div>`;
      btn.textContent = 'Done!';
